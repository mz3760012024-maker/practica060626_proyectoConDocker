version: '3.8'

services:
  db:
    image: postgres:13-alpine
    environment:
      POSTGRES_USER: ${DB_user}
      POSTGRES_PASSWORD: ${DB_pssd}
      POSTGRES_DB: tododb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
    restart: unless-stopped
  app:
    build: ./app
    environment:
      DB_HOST: ${DB_host}
      DB_USER: ${DB_user}
      DB_PASSWORD: ${DB_pssd}
      DB_NAME: tododb
    depends_on:
      - db
    networks:
      - app_network
    restart: unless-stopped
    volumes:
      - ./app:/app
      - ./logs:/app/logs
    # En desarrollo podríamos exponer el puerto 5000 directamente, pero usaremos Nginx
    # ports:
    #   - "5000:5000"

  web:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx-data/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - app_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  app_network:
    driver: bridge
